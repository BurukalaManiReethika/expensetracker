{% extends 'splitter/base.html' %}
{% block content %}
<h2>Create New Group</h2>
<form method="post" class="mt-3" style="max-width: 400px;">
    {% csrf_token %}
    <div class="mb-3">
        {{ form.name.label_tag }}
        {{ form.name }}
        {% if form.name.errors %}
            <div class="text-danger">{{ form.name.errors }}</div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-success">Create Group</button>
</form>
{% endblock %}
