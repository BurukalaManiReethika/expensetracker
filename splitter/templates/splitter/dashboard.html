{% extends 'splitter/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>My Groups</h2>
    <a href="{% url 'create_group' %}" class="btn btn-primary">+ Create Group</a>
</div>

{% if groups %}
    <div class="row">
        {% for group in groups %}
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ group.name }}</h5>
                    <p class="card-text text-muted">{{ group.members.count }} members</p>
                    <a href="{% url 'group_detail' group.id %}" class="btn btn-outline-primary btn-sm">View</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
{% else %}
    <p>You're not part of any group yet. Create one!</p>
{% endif %}
{% endblock %}
