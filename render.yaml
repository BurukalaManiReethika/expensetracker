services:
  # Main Django web app
  - type: web
    name: expense-splitter-web
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn expensetracker.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: expense-splitter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: expense-splitter-redis
          property: connectionString

  # Celery worker (processes background email tasks)
  - type: worker
    name: expense-splitter-celery-worker
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A expensetracker worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-splitter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: expense-splitter-redis
          property: connectionString

  # Redis instance (Celery broker)
  - type: redis
    name: expense-splitter-redis
    plan: free
    ipAllowList: []

databases:
  - name: expense-splitter-db
    plan: free
